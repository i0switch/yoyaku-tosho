<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Logged In Google Chrome">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="50%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="35%" stop-color="#34a853"/>
      <stop offset="68%" stop-color="#fbbc05"/>
      <stop offset="100%" stop-color="#ea4335"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="534" rx="36" fill="#ffffff" stroke="#dce8ff" stroke-width="4"/>
  <rect x="48" y="48" width="1104" height="14" rx="7" fill="url(#line)"/>
  <circle cx="170" cy="200" r="82" fill="#4285f4"/>
  <circle cx="170" cy="200" r="53" fill="#ffffff"/>
  <circle cx="170" cy="200" r="32" fill="#34a853"/>
  <path d="M170 118a82 82 0 0 1 71 41H170Z" fill="#ea4335"/>
  <path d="M98 160a82 82 0 0 0 72 122l35-60H143Z" fill="#fbbc05"/>
  <text x="290" y="195" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">
    Logged In Google Chrome
  </text>
  <text x="290" y="250" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="28">
    Launch regular Chrome, sign in manually, then attach Playwright over CDP.
  </text>
  <rect x="290" y="315" width="290" height="66" rx="18" fill="#4285f4"/>
  <text x="330" y="358" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Dedicated Profile
  </text>
  <rect x="604" y="315" width="220" height="66" rx="18" fill="#34a853"/>
  <text x="648" y="358" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    CDP Attach
  </text>
  <rect x="848" y="315" width="205" height="66" rx="18" fill="#ea4335"/>
  <text x="895" y="358" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Gmail Safe
  </text>
  <text x="290" y="455" fill="#475569" font-family="Consolas, Menlo, monospace" font-size="24">
    powershell -ExecutionPolicy Bypass -File .\scripts\launch_logged_in_chrome.ps1
  </text>
  <text x="290" y="505" fill="#475569" font-family="Consolas, Menlo, monospace" font-size="24">
    chromium.connectOverCDP("http://127.0.0.1:9222")
  </text>
